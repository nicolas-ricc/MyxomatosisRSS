{{ if .IsPage }}
<div class="substack-subscribe" style="display: flex; justify-content: center; padding: 2rem 0 1rem;">
  <div style="max-width: 480px; width: 100%; text-align: center;">
    <iframe
      src="https://{{ .Site.Params.substackUrl }}.substack.com/embed"
      width="100%"
      height="150"
      style="border: 1px solid var(--accent, #8ec07c); border-radius: 4px; background: var(--background, #1d2021);"
      frameborder="0"
      scrolling="no"
    ></iframe>
  </div>
</div>
{{ end }}
